name: comunio-news

services:
  app:
    image: ghcr.io/unividuell/comunio-news:latest
    container_name: comunio-news-app
    restart: unless-stopped
    # The buildpack run image sizes the JVM heap to the whole host (Headroom 0%); cap it so
    # the several JVMs on this box coexist.
    mem_limit: 2g
    environment:
      - SPRING_PROFILES_ACTIVE=oci
      # The app's H2 file DB defaults to ./db (=/workspace/db), which the non-root `cnb` user
      # cannot create (AccessDeniedException) -> Flyway fails -> crash loop. Point it at the
      # writable mounted ./data volume instead.
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/data/comunio-news;DB_CLOSE_ON_EXIT=FALSE
      - GOOGLE_GENAI_API_KEY=${GOOGLE_GENAI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STATS_COMUNIO_USER=${STATS_COMUNIO_USER}
      - STATS_COMUNIO_PW=${STATS_COMUNIO_PW}
    volumes:
      # H2 DB lands at ./data/comunio-news.mv.db; host dir must be owned by the buildpack
      # run user (uid 1002, gid 1000), else H2 still can't write.
      - ./data:/data
    depends_on:
      - redis
    networks:
      - edge      # reachable by the shared edge (reverse_proxy comunio-news-app:8080)
      - internal  # to reach redis
    # No in-container healthcheck: this Paketo "tiny" run image is distroless (no shell, no
    # curl/wget/ls) so no CMD probe can execute, and /actuator/health isn't exposed anyway
    # (management exposure = scheduledTasks,quartz). Liveness is observable at the edge.
    healthcheck:
      disable: true

  redis:
    image: redis:alpine
    container_name: comunio-news-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  redis-data:

networks:
  edge:
    external: true
  internal:
    driver: bridge
