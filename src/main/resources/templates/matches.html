<!DOCTYPE HTML>
<html
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main}">
<head>
  <title>Zingler46</title>
  <th:block layout:fragment="styles">
    <link rel="stylesheet" th:href="@{/css/matches.css}">
  </th:block>
</head>
<body>
<main layout:fragment="content">
  <section>
    <h2 th:text="'Spieltag' + ${groupOrderId}">Spieltag 15</h2>
    <div id="article-content_gameday"></div>
    <button th:hx-get="'/ai/matches/' + ${groupOrderId}"
            hx-trigger="click"
            hx-target="#article-content_gameday"
            hx-swap="outerHTML"
            hx-indicator="#loader-gameday">
      Generate Article for whole gameday
    </button>
    <!-- Loading Indicator -->
    <span id="loader-gameday" class="htmx-indicator" style="margin-left: 10px; color: grey;">
        Generiere... ⏳
      </span>
  </section>
  <section>
    <div th:each="match : ${matches}" class="match-card">
      <h2 style="text-align: center;" th:text="${match.homeClub.name} + ' — ' + ${match.awayClub.name}"></h2>
      <div th:id="'article-content_' + ${match.matchId}"></div>
      <button th:hx-get="'/ai/matches/' + ${match.groupOrderId} + '/' + ${match.matchId}"
              hx-trigger="click"
              th:hx-target="'#article-content_' + ${match.matchId}"
              hx-swap="outerHTML"
              th:hx-indicator="'#loader-' + ${match.matchId}">
        Generate Article
      </button>
      <!-- Loading Indicator -->
      <span th:id="'loader-' + ${match.matchId}" class="htmx-indicator" style="margin-left: 10px; color: grey;">
        Generiere... ⏳
      </span>
      <div style="text-align: center; margin-bottom: 10px;">
        <label style="cursor: pointer; font-size: 0.9em; color: grey;">
          <input type="checkbox"
                 onchange="this.closest('.match-card').querySelectorAll('table').forEach(t => t.classList.toggle('show-spoilers'))">
          Reveal Spoiler
        </label>
      </div>
      <div class="grid">
        <table th:replace="~{:: lineupTable(${match.homeClub.lineup})}"></table>
        <table th:replace="~{:: lineupTable(${match.awayClub.lineup})}"></table>
      </div>
    </div>
  </section>
</main>
</body>
<table
    class="striped" style="height: min-content; font-size: small;"
    th:fragment="lineupTable(lineups)"
    th:with="lineups=${lineups}"
>
  <!--/*@thymesVar id="lineups" type="java.util.List<org.unividuell.news.comunio.match.Player>"*/-->
  <thead>
  <tr>
    <th scope="col">P</th>
    <th scope="col">Name</th>
    <th scope="col">Member</th>
    <th scope="col" class="spoiler">⇄</th>
    <th scope="col" class="spoiler">Goals</th>
    <th scope="col" class="spoiler" style="text-align: end;">Points</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="lineup : ${lineups}">
    <!--/*@thymesVar id="lineup" type="org.unividuell.news.comunio.match.Player"*/-->
    <td th:text="${lineup.position.substring(0, 1)}"></td>
    <th scope="row">
      <span th:if="${lineup.clubLineupStatus == 'StartOnField'}" th:text="${lineup.name}"></span>
      <i th:if="${lineup.clubLineupStatus == 'StartOnBench'}" th:text="${lineup.name}"></i>
    </th>
    <td>
      <div th:if="${lineup.member != null}">
        <s th:if="${lineup.usedByMember == false}" th:text="${lineup.member}"></s>
        <b th:if="${lineup.usedByMember == true}" th:text="${lineup.member}"></b>
      </div>
    </td>
    <td class="spoiler">
      <span th:if="${lineup.substitutedInAtMin != null}" th:text="'→' + ${lineup.substitutedInAtMin}"></span>
      <span th:if="${lineup.substitutedOutAtMin != null}" th:text="'←' + ${lineup.substitutedOutAtMin}"></span>
    </td>
    <td class="spoiler">
      <div th:if="${lineup.goals > 0}">
        <span th:each="i : ${#numbers.sequence(1, lineup.goals)}">⚽</span>
      </div>
      <div th:if="${lineup.penaltyGoals > 0}">
        <span th:each="i : ${#numbers.sequence(1, lineup.penaltyGoals)}" style="opacity: 0.5;">⚽</span>
      </div>
    </td>
    <td th:text="${lineup.points}" class="spoiler" style="text-align: end;"></td>
  </tr>
  </tbody>
</table>
</html>
